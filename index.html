<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Alcatec</title>
</head>

<body>
    <div class="container">
        <nav class="nav">
            <div class="itens">
                <ul>
                    <li class="menu-itens active">
                        <a href="#home">
                            <span class="icon"><i class="bi bi-house"></i></span>
                            <span class="txt-link">Início</span>
                        </a>
                    </li>
                    <li class="menu-itens">
                        <a href="#people">
                            <span class="icon"><i class="bi bi-people"></i></span>
                            <span class="txt-link">Integrantes</span>
                        </a>
                    </li>
                    <li class="menu-itens">
                        <a href="#study">
                            <span class="icon"><i class="bi bi-mortarboard"></i></span>
                            <span class="txt-link">Monitorias</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="header">
            <header class="header-content" id="home">
                <div class="logo">
                    <img style="width: 6rem;" src="images/logo-alcatec.png" alt="Logo">
                    <p>Alcatec</p>
                </div>
            </header>

            <main class="main">
                <div class="interface">
                    <section class="page1">
                        <div class="grid-layout">
                            <div class="column a1">
                                <p>Coluna 01</p>
                            </div>
                            <div class="column a2">Coluna 02</div>
                            <div class="column a3">Coluna 03</div>
                            <div class="column a4">Coluna 04</div>
                        </div>
                    </section>
                    <section class="page2" id="people">
                        <h3>Página 2</h3>
                    </section>
                    <section class="page3" id="study">
                        <h3>Página 3</h3>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
